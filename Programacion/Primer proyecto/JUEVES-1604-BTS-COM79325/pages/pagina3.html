<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mundo Infantil - Contacto</title>
    <!-- css bootstrap -->
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
 <!-- css propio -->
  <link href="../styles/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-kids">
    <div class="container">
      <a class="navbar-brand" href="../index.html">  Mundo Infantil</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="pagina2.html">Aventuras</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Contacto</a></li>
          <li class="nav-item"><a class="nav-link" href="pagina4.html">Cuentos</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="p-0">
    <div class="container-fluid full-height">
      <div class="row g-0 full-height">
        <!-- Mobile: fila 1 imagen / Desktop: columna izq -->
        <div class="col-12 col-lg-6 order-1 order-lg-1 p-3">
          <img src="../img/form.jpg" class="form-img" alt="Nube con lápiz">
        </div>
        <!-- Mobile: fila 2 formulario / Desktop: columna der -->
        <div class="col-12 col-lg-6 order-2 order-lg-2">
          <div>
            <h2 class="colorRosa">¡Escríbenos!  </h2>
            <p>Cuéntanos qué aventura te gustaría vivir.</p>
            <form>
              <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" placeholder="Tu nombre">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Correo</label>
                <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com">
              </div>
              <div class="mb-3">
                <label for="mensaje" class="form-label">Mensaje</label>
                <textarea class="form-control" id="mensaje" rows="4" placeholder="Tu mensaje mágico..."></textarea>
              </div>
              <button type="submit" class="btn btn-form">Enviar </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-kids">
    <small>© 2026 Mundo Infantil. Todos los derechos reservados.</small>
  </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
